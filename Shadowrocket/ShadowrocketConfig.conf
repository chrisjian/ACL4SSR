# ========================
# 地区分组 (使用正则筛选)
# ========================
低倍率节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?i)0\.[1-9]x

🇭🇰 香港节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?=.*(HK|Hong|hong|香港|深港|沪港|京港|港).)^((?!(([^.][2-9]|\d{2})x)).)*$

🇨🇳 台湾节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?=.*(TW|Taiwan|taiwan|台湾|台北|台中|新北|彰化).)^((?!(([^.][2-9]|\d{2})x)).)*$

🇯🇵 日本节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?=.*(JP|Japan|japan|Tokyo|tokyo|日本|东京|大阪|京日|苏日|沪日|上日|川日|深日|广日).)^((?!(([^.][2-9]|\d{2})x)).)*$

🇺🇲 美国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?=.*(US|USA|America|america|United States|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|美).)^((?!(([^.][2-9]|\d{2})x)).)*$

🇺🇲 美西节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?=.*(美西|硅谷|洛杉矶|圣何塞|圣克拉拉|西雅图|旧金山).)^((?!(([^.][2-9]|\d{2})x)).)*$

🇸🇬 狮城节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?=.*(SG|Sing|sing|新加坡|狮城|沪新|京新|深新|杭新|广新).)^((?!(([^.][2-9]|\d{2})x)).)*$

🇰🇷 韩国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(?=.*(KR|Korea|korea|KOR|韩国|首尔|韩|韓|春川).)^((?!(([^.][2-9]|\d{2})x)).)*$

🇲🇴 澳门节点 = url-test,url=http://www.gstatic.com/generate_204,interval=120,tolerance=50,timeout=5,policy-regex-filter=(澳门|MO)

